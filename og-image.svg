<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0b0d09"/>
  <!-- Subtle network lines -->
  <g opacity="0.12" stroke="#6b7a42" stroke-width="1" fill="none">
    <line x1="0" y1="200" x2="300" y2="80"/><line x1="300" y1="80" x2="600" y2="160"/><line x1="600" y1="160" x2="900" y2="40"/><line x1="900" y1="40" x2="1200" y2="120"/>
    <line x1="0" y1="400" x2="200" y2="280"/><line x1="200" y1="280" x2="500" y2="350"/><line x1="500" y1="350" x2="800" y2="200"/><line x1="800" y1="200" x2="1100" y2="320"/><line x1="1100" y1="320" x2="1200" y2="280"/>
    <line x1="300" y1="80" x2="200" y2="280"/><line x1="600" y1="160" x2="500" y2="350"/><line x1="900" y1="40" x2="800" y2="200"/><line x1="1100" y1="320" x2="900" y2="40"/>
  </g>
  <!-- Node dots -->
  <g fill="#6b7a42" opacity="0.4">
    <circle cx="300" cy="80" r="5"/><circle cx="600" cy="160" r="5"/><circle cx="900" cy="40" r="4"/><circle cx="200" cy="280" r="4"/><circle cx="500" cy="350" r="5"/><circle cx="800" cy="200" r="4"/><circle cx="1100" cy="320" r="4"/>
  </g>
  <!-- Green glow at center-left -->
  <radialGradient id="glow" cx="35%" cy="50%" r="45%">
    <stop offset="0%" stop-color="#6b7a42" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#0b0d09" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo mark -->
  <rect x="80" y="210" width="72" height="72" rx="16" fill="#6b7a42"/>
  <g transform="translate(80,210)">
    <path d="M16 27h34.5M40 18l9 9-9 9M56 45H21.5M28 36l-9 9 9 9" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- AGX wordmark -->
  <text x="174" y="268" font-family="'Arial Black', 'Arial', sans-serif" font-size="72" font-weight="900" letter-spacing="-2" fill="white">AGX</text>

  <!-- Main tagline -->
  <text x="80" y="340" font-family="Arial, sans-serif" font-size="36" font-weight="300" fill="white" opacity="0.55" letter-spacing="2">AI Agent Launchpad</text>

  <!-- Solana pill -->
  <rect x="80" y="368" width="200" height="44" rx="22" fill="none" stroke="#059669" stroke-width="1.5" opacity="0.7"/>
  <text x="110" y="396" font-family="'Courier New', monospace" font-size="18" fill="#059669" font-weight="700" letter-spacing="1">Built on Solana</text>

  <!-- Right side: stats block -->
  <rect x="780" y="200" width="340" height="230" rx="18" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <text x="950" y="258" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="white" fill-opacity="0.4" letter-spacing="2">LIVE AGENTS</text>
  <text x="950" y="310" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="56" font-weight="900" fill="white">9</text>
  <line x1="820" y1="340" x2="1100" y2="340" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
  <text x="870" y="378" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="700" fill="#4ade80">$3.4M</text>
  <text x="870" y="400" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="white" fill-opacity="0.35" letter-spacing="1">TOTAL MCAP</text>
  <text x="1040" y="378" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="700" fill="#a3e635">5.8K</text>
  <text x="1040" y="400" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="white" fill-opacity="0.35" letter-spacing="1">HOLDERS</text>

  <!-- Bottom bar -->
  <rect x="0" y="540" width="1200" height="90" fill="white" fill-opacity="0.03"/>
  <line x1="0" y1="540" x2="1200" y2="540" stroke="white" stroke-opacity="0.08" stroke-width="1"/>

  <!-- EasyA badge -->
  <text x="80" y="596" font-family="'Courier New', monospace" font-size="13" fill="white" fill-opacity="0.35" letter-spacing="2">LAUNCHPAD ON</text>
  <text x="240" y="596" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#7ec850">EasyA Kickstart</text>

  <!-- X handle -->
  <text x="1120" y="596" text-anchor="end" font-family="'Courier New', monospace" font-size="15" fill="white" fill-opacity="0.5">𝕏 @agentexchange_</text>

  <!-- agentmarket.exchange -->
  <text x="600" y="596" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="white" fill-opacity="0.25" letter-spacing="1">agentmarket.exchange</text>
</svg>
